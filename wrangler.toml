name = "mcp-app"
main = "api/main.workers.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[build]
command = "bun run build:web"

# Treat built HTML (and any .min.js assets) as plain text strings, not ES modules
[[rules]]
type = "Text"
globs = ["dist/client/*.html"]
fallthrough = true
